<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DownStream</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <span class="brand-diamond">&#9670;</span>
        <span class="brand-name">DownStream</span>
      </div>
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-label" id="status-label">Connecting&hellip;</span>
        <span class="speed-badge" id="speed-badge">&mdash;</span>
      </div>
    </header>

    <!-- Active Downloads -->
    <section class="section" id="section-active">
      <div class="section-head">
        <span class="section-title">Active</span>
        <span class="section-count" id="active-count">0</span>
      </div>
      <div class="dl-list" id="active-list"></div>
    </section>

    <!-- Detected Streams -->
    <section class="section" id="section-streams" hidden>
      <div class="section-head">
        <span class="section-title">Detected Streams</span>
        <span class="section-count" id="streams-count">0</span>
      </div>
      <div class="dl-list" id="streams-list"></div>
    </section>

    <!-- Paused / Waiting -->
    <section class="section" id="section-paused" hidden>
      <div class="section-head">
        <span class="section-title">Paused</span>
        <span class="section-count" id="paused-count">0</span>
      </div>
      <div class="dl-list" id="paused-list"></div>
    </section>

    <!-- Recent -->
    <section class="section" id="section-recent" hidden>
      <div class="section-head">
        <span class="section-title">Recent</span>
        <span class="section-count" id="recent-count">0</span>
      </div>
      <div class="dl-list" id="recent-list"></div>
    </section>

    <!-- Empty State -->
    <div class="empty" id="empty-state" hidden>
      <div class="empty-icon">&#8681;</div>
      <p class="empty-title">No downloads</p>
      <p class="empty-hint">Right-click any link or media to download, or use the inline button on video pages.</p>
    </div>

    <!-- Offline State -->
    <div class="offline" id="offline-state" hidden>
      <div class="offline-dot"></div>
      <p class="offline-title">Server offline</p>
      <p class="offline-hint">Start DownStream with <code>npm start</code></p>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-row">
        <button class="footer-btn" id="btn-dashboard">Open Dashboard &#8599;</button>
        <button class="footer-btn footer-btn--icon" id="btn-settings" title="Settings">&#9881;</button>
      </div>
    </footer>

    <!-- Settings Panel -->
    <div id="settings-panel" class="settings-panel" hidden>
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <button class="settings-close" id="btn-settings-close">&times;</button>
      </div>
      <div class="settings-body">
        <div class="setting-row">
          <label class="setting-label">Bandwidth Limit</label>
          <div class="setting-control">
            <input type="range" id="setting-bandwidth" class="setting-slider" min="0" max="10240" step="100" value="0">
            <span class="setting-value" id="bandwidth-value">Unlimited</span>
          </div>
        </div>
        <div class="setting-row">
          <label class="setting-label">Auto-download Subtitles</label>
          <div class="setting-control">
            <label class="toggle">
              <input type="checkbox" id="setting-subtitles">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>
        <div class="setting-row">
          <label class="setting-label">Scheduled Downloads</label>
          <div class="setting-control">
            <span class="setting-count" id="scheduled-count">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Schedule Modal -->
    <div id="schedule-overlay" class="confirm-overlay" hidden>
      <div class="confirm-box schedule-box">
        <p class="confirm-message">Schedule Download</p>
        <div class="schedule-form">
          <label class="schedule-label">Download at:</label>
          <input type="datetime-local" id="schedule-datetime" class="schedule-input">
        </div>
        <div class="confirm-buttons">
          <button class="confirm-btn confirm-btn--cancel" id="btn-schedule-cancel">Cancel</button>
          <button class="confirm-btn confirm-btn--confirm" id="btn-schedule-ok">Schedule</button>
        </div>
      </div>
    </div>

    <!-- Confirm Dialog Overlay -->
    <div id="confirm-overlay" class="confirm-overlay" hidden>
      <div class="confirm-box">
        <p class="confirm-message" id="confirm-message">Are you sure?</p>
        <div class="confirm-buttons">
          <button class="confirm-btn confirm-btn--cancel" id="btn-confirm-cancel">Cancel</button>
          <button class="confirm-btn confirm-btn--confirm" id="btn-confirm-ok">OK</button>
        </div>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
