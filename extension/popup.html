<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DownStream</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header class="header">
      <div class="brand">
        <span class="brand-diamond">&#9670;</span>
        <span class="brand-name">DownStream</span>
      </div>
      <div class="status">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-label" id="status-label">Connecting&hellip;</span>
        <span class="speed-badge" id="speed-badge">&mdash;</span>
      </div>
    </header>

    <!-- Active Downloads -->
    <section class="section" id="section-active">
      <div class="section-head">
        <span class="section-title">Active</span>
        <span class="section-count" id="active-count">0</span>
      </div>
      <div class="dl-list" id="active-list"></div>
    </section>

    <!-- Detected Streams -->
    <section class="section" id="section-streams" hidden>
      <div class="section-head">
        <span class="section-title">Detected Streams</span>
        <span class="section-count" id="streams-count">0</span>
      </div>
      <div class="dl-list" id="streams-list"></div>
    </section>

    <!-- Paused / Waiting -->
    <section class="section" id="section-paused" hidden>
      <div class="section-head">
        <span class="section-title">Paused</span>
        <span class="section-count" id="paused-count">0</span>
      </div>
      <div class="dl-list" id="paused-list"></div>
    </section>

    <!-- Recent -->
    <section class="section" id="section-recent" hidden>
      <div class="section-head">
        <span class="section-title">Recent</span>
        <span class="section-count" id="recent-count">0</span>
      </div>
      <div class="dl-list" id="recent-list"></div>
    </section>

    <!-- Empty State -->
    <div class="empty" id="empty-state" hidden>
      <div class="empty-icon">&#8681;</div>
      <p class="empty-title">No downloads</p>
      <p class="empty-hint">Right-click any link or media to download, or use the inline button on video pages.</p>
    </div>

    <!-- Offline State -->
    <div class="offline" id="offline-state" hidden>
      <div class="offline-dot"></div>
      <p class="offline-title">Server offline</p>
      <p class="offline-hint">Start DownStream with <code>npm start</code></p>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <button class="footer-btn" id="btn-dashboard">Open Dashboard &#8599;</button>
    </footer>

    <!-- Confirm Dialog Overlay -->
    <div id="confirm-overlay" class="confirm-overlay" hidden>
      <div class="confirm-box">
        <p class="confirm-message" id="confirm-message">Are you sure?</p>
        <div class="confirm-buttons">
          <button class="confirm-btn confirm-btn--cancel" id="btn-confirm-cancel">Cancel</button>
          <button class="confirm-btn confirm-btn--confirm" id="btn-confirm-ok">OK</button>
        </div>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
