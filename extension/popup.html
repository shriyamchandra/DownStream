<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #1e1e1e;
      color: #e1e1e1;
      margin: 0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .title {
      font-size: 0.95rem;
      font-weight: 600;
    }
    .switch-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #252526;
      padding: 10px;
      border-radius: 8px;
    }
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #555;
      transition: .3s;
      border-radius: 24px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #0a84ff;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .status-text {
      font-size: 0.8rem;
      color: #969696;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">DownStream</div>
  </div>
  <div class="switch-container">
    <span class="status-text" id="statusLabel">Interception Active</span>
    <label class="switch">
      <input type="checkbox" id="interceptToggle">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
